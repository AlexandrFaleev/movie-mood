<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Корпус камеры (темно-серый) -->
    <rect x="20" y="30" width="60" height="40" rx="8" fill="#2c3e50"/>

    <!-- Объектив (внешний круг) -->
    <circle cx="50" cy="50" r="16" fill="#34495e"/>
    <!-- Стекло объектива (внутренний круг) -->
    <circle cx="50" cy="50" r="10" fill="#7f8c8d"/>
    <!-- Блик на объективе -->
    <circle cx="54" cy="46" r="2" fill="#ecf0f1"/>

    <!-- Вспышка (маленький квадрат на корпусе) -->
    <rect x="70" y="35" width="8" height="6" fill="#f1c40f" rx="1"/>

    <!-- Деталь камеры (видоискатель) -->
    <rect x="28" y="28" width="8" height="6" fill="#bdc3c7" rx="1"/>

    <!-- Кинолента (декоративные кружки по бокам) -->
    <circle cx="25" cy="55" r="3" fill="#e67e22"/>
    <circle cx="75" cy="55" r="3" fill="#e67e22"/>
</svg>